<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Giant Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Welcome to the Giant Webpage</h1>

    <p class="intro">
        Welcome. Somewhere on this page is a
        <span class="highlight">hidden message</span>.
        Scroll in every direction to find it.
    </p>

    <div class="secret-box">
        <p>Visible div using the CSS box model.</p>
    </div>

    <img 
        src="https://now.tufts.edu/sites/default/files/uploaded-assets/images/2022-11/221201_secret_life_of_secrets_1070132669.jpg"
        alt="Shhhh."
        class="secret-image"
    >

    <div id="corner-message">
        🎉 You reached the edge of the giant page!
    </div>

</body>
</html>
